# ~/.tmux.conf
set -g default-terminal "tmux-256color"
# *:RGB (not xterm-256color) so Ghostty's xterm-ghostty TERM still gets 24-bit color.
set -ag terminal-overrides ",*:RGB"

set -g prefix C-a
unbind C-b
set -s escape-time 1

# focus-events: nvim autoread, cursor shape, theme focus-follow
set -g focus-events on

set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# send literal C-a to inner apps
bind C-a send-prefix
bind-key -n C-q send-prefix

# splits/new-window keep cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# lazygit float
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
# scratch shell float (p was previous-window, unused). fresh shell in cwd, not persistent.
bind p display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# pop pane out to its own window / pull a pane in from another window
bind b break-pane -d
bind B choose-tree -Zw "join-pane -t '%%'"

# 50k: plenty of scrollback without bloating resurrect saves / memory
set -g history-limit 50000

setw -g automatic-rename on
set -g renumber-windows on
# closing a session lands you in another (not out of tmux); needed for sesh + sesh-last
set -g detach-on-destroy off

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity on

# passthrough needs tmux 3.3+ (kitty graphics / sixel inside tmux)
if-shell 'tmux -V | awk "{split(\$2,v,\".\"); if(v[1]>3||(v[1]==3&&v[2]>=3))exit 0; exit 1}"' {
  set -g allow-passthrough on
}

# OSC 52 so tmux-yank copies to the local clipboard over SSH
set -s set-clipboard on


###########
# Navigator
###########
# pane nav is vim-tmux-navigator (Ctrl-hjkl, seamless with nvim)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

#########
# Plugins
#########
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/double/cyan'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'kristijan/tmux-fzf-pane-switch'
# prefix+Tab: fzf popup over pane text (paths/urls/hashes); enter=copy, tab=insert to prompt
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_clip_mode 'tmux_osc52'
# prefix+f: hint-labels on screen, press label to grab (was find-window; use prefix+w for that)
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key f

set -g @fzf_pane_switch_bind-key "O"
set -g @fzf_pane_switch_list-panes-format "pane_id session_name window_name pane_title pane_current_command"

set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @suspend_key 'F12'

# fzf session switcher
# sesh: fuzzy jump to any project/session (existing or new). ^a all ^t tmux ^g configs ^x zoxide ^d kill
# no --preview: it recomputed per keystroke (~56ms) and killed scroll snappiness.
bind o run-shell "sesh connect \"$(sesh list --icons | fzf-tmux -p 60%,50% --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill' --bind 'tab:down,btab:up' --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)')\""

# over SSH, force tmux-yank through OSC 52 instead of the (absent) system clipboard
if-shell '[ -n "$SSH_CONNECTION" ]' {
  set -g @override_copy_command 'buf=$(base64 | tr -d "\n"); printf "\033]52;c;%s\a" "$buf" > "#{pane_tty}"'
}

# resurrect/continuum + claude-resume hooks are mac-only (my linux boxes don't persist)
if-shell 'test "$(uname)" = "Darwin"' {
  set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @resurrect-capture-pane-contents 'on'
  set -g @continuum-restore 'on'
  # snapshot live claude panes on save, relaunch `claude --resume` on restore
  set -g @resurrect-hook-post-save-all    'bash "$HOME/.claude/hooks/resurrect_presave.sh"'
  set -g @resurrect-hook-post-restore-all 'bash "$HOME/.claude/hooks/resurrect_postrestore.sh"'
}

########
# Visual
########
set -g mouse on
set-window-option -g mode-keys vi

# dim inactive panes. nvim panes ignore this (they paint their own bg).
set -g window-style 'fg=#5a6183,bg=#101014'
set -g window-active-style 'fg=#c0caf5,bg=#1a1b26'

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
# don't drop out of copy mode when a mouse drag ends
unbind -T copy-mode-vi MouseDragEnd1Pane

##### Status Bar #####
set -g status-interval 60
set -g status-justify centre
set-option -g status-position bottom

#####
# TPM
#####
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# keep tpm init at the very bottom
run '~/.tmux/plugins/tpm/tpm'

# themepack bakes %H:%M:%S into status-right and ignores the format var, so strip
# seconds after it builds. must run post-TPM.
run-shell "tmux set -g status-right \"$(tmux show -gv status-right | sed 's/%H:%M:%S/%H:%M/')\""

# tmux-fingers binds prefix+J to jump-mode (default @fingers-jump-key=J), clobbering the
# resize bind at top. re-assert it post-TPM so prefix+J resizes down again. jump mode unused.
bind -r J resize-pane -D 5
